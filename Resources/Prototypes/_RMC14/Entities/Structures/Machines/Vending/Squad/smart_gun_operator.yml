# SMART GUN OPERATOR

- type: entity
  parent: ColMarTechBase
  id: ColMarTechSGGear
  name: ColMarTech squad smart gun operator gear rack
  description: An automated gear rack for Squad Smart Gun Operators.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessSmartPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/smart_gun_operator_gear.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMSmartGunOperator
    sections:
    - name: Набор умного оружия (обязательно)
      takeAll: CMSmartGunSet
      entries:
      - id: CMSmartGunOperatorEquipmentCase
    - name: Обвесы
      choices: { CMGunAttachments: 1 }
      entries:
#      - id: RMCAttachmentLaserSight # TODO RMC14 when other pistols are available here
#      - id: RMCAttachmentS5RedDotSight # Uncomment when accuracy is implemented.
      - id: RMCAttachmentS6ReflexSight
    - name: Взрывчатка
      entries:
      - id: CMPacketGrenadeHighExplosiveFilled
        points: 30
    #- id: CMM40HIDPIncendiaryPacketx3
    #  points: 30
    #- id: CMM40HPDPWhitePhosphorusPacketx3
    #  points: 30
    #- id: CMM40HSDPSmokePacketx3
    #  points: 15
    #- id: CMM74AGM-FragAirburstPacketx3
    #  points: 20
    #- id: CMM74AGM-IncendiaryAirburstPacketx3
    #  points: 20
    #- id: CMM74AGM-SmokeAirburstPacketx3
    #  points: 10
    #- id: CMM74AGM-HornetAirburstPacketx3
    #  points: 20
    #- id: CMM20MineBox4
    #  points: 20
    - name: Боеприпасы к оружию
      entries:
      - id: CMMagazinePistolMK80
        points: 5
      - id: RMCMagazinePistolSU6
        points: 10
    - name: Огнестрельное оружие ограниченного поражения
      entries:
      - id: RMCMK80Case
        points: 15
      - id: RMCSmartPistolCase
        points: 15
    - name: Предметы одежды
      entries:
    #- id: CMScabbardMacheteFull
    #  points: 6
    #- id: CMFuelTankStrapPouch
    #  points: 5
      - id: CMPouchGeneralLarge
        points: 6
    - name: Утилиты
      entries:
      - id: CMFireExtinguisherPortable
        points: 5
      - id: RMCWhistle
        points: 5
      - id: CMRollerBedSpawnFolded
        points: 5
    #- id: CMFultonDeviceStack
    #  points: 5
      - id: RMCPowerCellSmartgun
        points: 15
    - name: Бинокли
      entries:
      - id: RMCBinoculars
        points: 5
    #- id: CMRangeFinder
    #  points: 10
    #- id: CMLaserDesignator
    #  points: 15
    - name: Оптика шлема
      entries: [ ]
    #- id: CMMedicalHelmetOptic
    #  points: 15
    #- id: CMWeldingVisor
    #  points: 5
    - name: Памфлеты
      entries: [ ]
    #- id: CMPamphletJTAC
    #  points: 15
    #- id: CMPamphletEngineering
    #  points: 15
    - name: Радиоключи
      entries:
      - id: CMEncryptionKeyEngineer
        points: 5
      - id: CMEncryptionKeyIntel
        points: 5
      - id: CMEncryptionKeyJTAC
        points: 5
      - id: CMEncryptionKeyRequisition
        points: 5

- type: entity
  parent: ColMarTechBase
  id: ColMarTechSGEquipment
  name: ColMarTech squad Smart Gun equipment rack
  description: An automated rack hooked up to a colossal storage of Squad Smart Gun standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessSmartPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMSmartGunOperator
    sections:
    - name: Стандартное снаряжение
      takeAll: CMStandard
      entries:
      - id: CMVendorBundleRiflemanApparel
      - id: CMMRE
      #- id: CMMap # TODO: Make a map
    - name: Пояса
      choices: { CMBelt: 1 }
      entries:
     #- id: CMM802SmartGunOperatorSidearmBeltFilled
      - id: CMBeltSmartGunOperatorFilled
    - name: Подсумки
      choices: { CMPouch: 2 }
      entries:
      - id: CMPouchFlareFilled
        name: подсумок фаеров (заполненный)
#      - id: CMPouchElectronics # TODO RMC14
      - id: CMPouchFirstAidInjectors
        name: подсумок первой помощи (многоразовые инъекторы)
        recommended: true
      - id: CMPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (марля, мазь) # TODO RMC14 splints comma
        recommended: true
      - id: CMPouchFirstAidPills
        name: подсумок первой помощи (таблетки)
        recommended: true
      - id: CMPouchMagazinePistolLarge
        recommended: true
      - id: CMPouchMagazine
      - id: CMPouchShotgun
      - id: CMPouchGeneralMedium
      - id: CMPouchPistol
      - id: CMPouchMacheteFilled
    #- id: CMSlingPouch
    - name: Аксессуары
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBrown
        recommended: true
      - id: CMWebbingBlack
    #- id: CMShoulderHolster
      - id: CMWebbing
    #- id: CMDropPouch
    - name: Маски
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskGas
      - id: CMMaskCoif
