- type: entity
  id: CMLightPostSmall
  name: post light
  description: "A small light post."
  suffix: Empty
  parent: LightPostSmall
  components:
  - type: Sprite
    sprite: _CM14/Structures/Lighting/floodlight.rsi
    snapCardinals: true
    drawdepth: Objects
    noRot: true
    layers:
    - map: ["enum.PoweredLightLayers.Base"]
      state: flood_0
    - map: ["enum.PoweredLightLayers.Glow"]
      state: flood_1
      shader: unshaded
    state: flood_0
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "0.5,0.5,-0.5,-0.5"
        density: 190
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          CMSheetMetal1:
            min: 2
            max: 4
      - !type:EmptyAllContainersBehaviour
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
  - type: PointLight
    radius: 10
    energy: 2.5
    softness: 0.9
    color: "#FFFFEE"

- type: entity
  id: CMLightPost
  name: post light
  description: "A small light post."
  suffix: Empty
  parent: LightPostSmall
  components:
  - type: Sprite
    sprite: _CM14/Structures/Lighting/big_floodlight.rsi
    snapCardinals: true
    drawdepth: Objects
    noRot: true
    offset: 0,0.5
    layers:
    - map: ["enum.PoweredLightLayers.Base"]
      state: flood_s_off
    - map: ["enum.PoweredLightLayers.Glow"]
      state: flood_s_on
      shader: unshaded
    state: flood_s_off
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "0.5,0.5,-0.5,-0.5"
        density: 190
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          CMSheetMetal1:
            min: 2
            max: 4
      - !type:EmptyAllContainersBehaviour
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
  - type: PointLight
    radius: 10
    energy: 0.5
    softness: 0.9
    color: "#FFFFEE"

